<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="แบบสอบถามความพึงพอใจและการใช้ประโยชน์จากนวัตกรรม">
  <title>แบบสอบถามความพึงพอใจ | ระบบประเมินนวัตกรรม</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="header-brand">
        <div class="logo-icon"><i class="fas fa-clipboard-check"></i></div>
        <div>
          <h1 id="header-title">แบบสอบถามความพึงพอใจ</h1>
          <div class="subtitle" id="header-subtitle">ระบบประเมินนวัตกรรม</div>
        </div>
      </a>
      <button class="menu-toggle" id="menuToggle" aria-label="เปิดเมนู"><i class="fas fa-bars"></i></button>
      <nav class="header-nav" id="headerNav">
        <a href="index.html" class="active"><i class="fas fa-edit"></i> ทำแบบสอบถาม</a>
        <a href="dashboard.html"><i class="fas fa-chart-pie"></i> สรุปผล</a>
      </nav>
    </div>
  </header>

  <!-- Progress -->
  <div class="progress-container" id="progressContainer">
    <div class="progress-bar-wrapper">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-info">
      <span id="progressSection">ส่วนที่ 1: ข้อมูลทั่วไป</span>
      <span id="progressPercent">0%</span>
    </div>
  </div>

  <!-- Main Content -->
  <main class="container" id="surveyContainer">
    <!-- จะถูก render โดย survey.js ตามข้อมูลจาก Config -->
    <div class="card" style="text-align:center; padding: 60px 20px;">
      <div class="spinner" style="margin: 0 auto 16px;"></div>
      <p class="loading-text">กำลังโหลดแบบสอบถาม...</p>
    </div>
  </main>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p class="loading-text" id="loadingText">กำลังส่งข้อมูล...</p>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Footer -->
  <footer class="footer">
    <p>ระบบแบบสอบถามความพึงพอใจ © <span id="footerYear">2568</span></p>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/survey.js"></script>
</body>
</html>
